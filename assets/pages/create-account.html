<!-- ══════════════════════════════════════
     CREATE ACCOUNT PAGE
══════════════════════════════════════ -->
<div class="auth-screen">

  <!-- Purple header -->
  <div class="auth-header">
    <div class="auth-header-bubble auth-header-bubble-1"></div>
    <div class="auth-header-bubble auth-header-bubble-2"></div>

    <button
      class="auth-back-btn"
      onclick="navigateTo('splash')"
    >
      <i class="ti ti-arrow-left"></i>
    </button>

    <h1>Create Account</h1>
    <p>Join KwandaData and start earning</p>
  </div>

  <!-- Form body -->
  <div class="auth-body">

    <!-- First name + Last name -->
    <div class="name-row">
      <div class="form-group">
        <label for="first-name">First Name</label>
        <input
          type="text"
          id="first-name"
          placeholder="John"
        />
      </div>
      <div class="form-group">
        <label for="last-name">Last Name</label>
        <input
          type="text"
          id="last-name"
          placeholder="Doe"
        />
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="reg-email">Email Address</label>
      <div class="input-wrap has-icon-left">
        <i class="ti ti-mail"></i>
        <input
          type="email"
          id="reg-email"
          placeholder="john@example.com"
        />
      </div>
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label for="reg-phone">Phone Number</label>
      <div class="input-wrap has-icon-left">
        <i class="ti ti-phone"></i>
        <input
          type="tel"
          id="reg-phone"
          placeholder="+27 000 000 0000"
        />
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="reg-password">Password</label>
      <div class="input-wrap has-icon-both">
        <i class="ti ti-lock"></i>
        <input
          type="password"
          id="reg-password"
          placeholder="Create a password"
        />
        <i
          class="ti ti-eye icon-right"
          onclick="togglePassword('reg-password', this)"
        ></i>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label for="reg-confirm">Confirm Password</label>
      <div class="input-wrap has-icon-both">
        <i class="ti ti-lock"></i>
        <input
          type="password"
          id="reg-confirm"
          placeholder="Repeat your password"
        />
        <i
          class="ti ti-eye icon-right"
          onclick="togglePassword('reg-confirm', this)"
        ></i>
      </div>
    </div>

    <!-- Terms checkbox -->
    <div class="terms-row">
      <input type="checkbox" id="terms" />
      <label for="terms">
        I agree to the
        <a href="#">Terms of Service</a>
        and
        <a href="#">Privacy Policy</a>
      </label>
    </div>

    <!-- Error message (hidden by default) -->
    <p class="auth-error" id="reg-error"></p>

    <!-- Submit button -->
    <button
      class="btn-purple"
      onclick="handleRegister()"
    >
      Create Account
    </button>

    <!-- Footer link -->
    <p class="auth-footer">
      Already have an account?
      <span onclick="navigateTo('sign-in')">Sign In</span>
    </p>

  </div>
</div>
