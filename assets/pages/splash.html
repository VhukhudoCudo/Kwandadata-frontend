<!-- ══════════════════════════════════════
     SPLASH SCREEN
══════════════════════════════════════ -->
<div class="splash-screen">

  <!-- Background bubbles -->
  <div class="splash-bubble splash-bubble-1"></div>
  <div class="splash-bubble splash-bubble-2"></div>
  <div class="splash-bubble splash-bubble-3"></div>

  <!-- Center content -->
  <div class="splash-center">

    <!-- Logo -->
    <div class="splash-logo">
      <svg viewBox="0 0 48 48" fill="none">
        <path
          d="M10 36 L20 12 L28 28 L34 18 L42 36"
          stroke="white"
          stroke-width="4.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>

    <!-- Title -->
    <h1 class="splash-title">KwandaData</h1>
    <p class="splash-tagline">Participate. Earn. Connect.</p>
    <p class="splash-sub">
      Your participation powers<br/>your connectivity.
    </p>

  </div>

  <!-- Action buttons -->
  <div class="splash-actions">
    <button
      class="btn-primary"
      onclick="navigateTo('create-account')"
    >
      Create Account
    </button>
    <button
      class="btn-outline"
      onclick="navigateTo('sign-in')"
    >
      Sign In
    </button>
    <button class="btn-link">Learn More</button>
  </div>

  <!-- Bottom bar -->
  <div class="splash-bar"></div>

</div>
